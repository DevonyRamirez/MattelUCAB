<div class="split-layout">
  <!-- Left Side -->
  <div class="left-panel">
    <div class="brand-content">
      <img src="assets/mattelucab-logos.png" alt="MattelUCAB Logo" class="brand-logo" />
      <p class="brand-subtitle"><em>Accede al mercado exclusivo de activos coleccionables</em></p>
    </div>
  </div>

  <!-- Right Side -->
  <div class="right-panel">
    <div class="form-container">
      <h1 class="form-title"><em>Bienvenido</em></h1>
      <p class="form-subtitle">Ingresa tus datos para entrar al mundo de Barbie</p>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        <div class="campo">
          <label for="username"><span>Usuario</span></label>
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="username"
            required
            placeholder="tu_usuario" />
        </div>

        <div class="campo">
          <label for="password"><span>Contraseña</span></label>
          <div class="password-input-wrapper">
            <input
              [type]="mostrarContrasena ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="password"
              required
              placeholder="........" />
            <button type="button" class="toggle-password" (click)="toggleContrasena()">
              <!-- SVG icon for eye open/closed -->
              <svg *ngIf="!mostrarContrasena" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg *ngIf="mostrarContrasena" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn" [disabled]="!loginForm.form.valid">
          Iniciar sesión de forma segura
        </button>
      </form>
    </div>
  </div>
</div>
