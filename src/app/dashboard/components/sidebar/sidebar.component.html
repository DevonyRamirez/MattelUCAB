<div class="sidebar-inner">
  <ul class="nav-links">
    <li *ngFor="let item of navItems">
      <a *ngIf="item.visible" [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: item.exact || false}">
        <span class="nav-icon">
          <svg *ngIf="item.icon === 'home'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <svg *ngIf="item.icon === 'reportes'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"></path>
            <path d="M7 14l3-3 3 2 5-6"></path>
          </svg>
          <svg *ngIf="item.icon === 'disenos'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
          </svg>
          <svg *ngIf="item.icon === 'usuarios'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <svg *ngIf="item.icon === 'privilegios'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h4"></path>
            <path d="M15 11h4a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-4"></path>
            <path d="M12 3v18"></path>
            <path d="M8 7h8"></path>
          </svg>
        </span>
        <span>{{ item.label }}</span>
      </a>
    </li>
  </ul>

  <button type="button" class="logout-button" (click)="cerrarSesion()">
    <span class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </span>
    <span>Cerrar sesion</span>
  </button>
</div>
